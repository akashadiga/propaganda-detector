<section class="max-w-4xl mx-auto px-6 py-12">
  <!-- Header -->
  <div class="text-center mb-10">
    <h1 class="text-4xl font-bold text-slate-900 mb-3">
      Is it <span class="text-propaganda">Propaganda</span>?
    </h1>
    <p class="text-slate-500 text-lg max-w-xl mx-auto">
      Paste a news article below and our ML model will classify it instantly.
    </p>
  </div>

  <!-- Input card -->
  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
    <textarea
      [ngModel]="text()"
      (ngModelChange)="text.set($event)"
      name="text"
      rows="10"
      placeholder="Paste your news article here..."
      class="w-full resize-none text-sm text-slate-800 placeholder-slate-400 border border-slate-200
             rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
             transition"
      [class.border-red-400]="isOverLimit()"
      [class.ring-red-400]="isOverLimit()">
    </textarea>

    <!-- Character counter -->
    <div class="flex items-center justify-between mt-2 mb-5">
      <span class="text-xs" [ngClass]="isOverLimit() ? 'text-propaganda font-semibold' : 'text-slate-400'">
        {{ charCount() | number }} / {{ maxChars | number }} characters
        <span *ngIf="charCount() < minChars && charCount() > 0" class="ml-1 text-amber-500">
          (min {{ minChars }})
        </span>
      </span>
      <button
        *ngIf="text().length > 0"
        (click)="onClear()"
        class="text-xs text-slate-400 hover:text-slate-600 transition-colors">
        Clear
      </button>
    </div>

    <!-- Error -->
    <p *ngIf="error()" class="text-sm text-propaganda bg-propaganda-light rounded-lg px-4 py-2 mb-4">
      {{ error() }}
    </p>

    <!-- Buttons -->
    <div class="flex flex-col sm:flex-row gap-3">
      <button
        (click)="onGenerate()"
        [disabled]="generating()"
        class="flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl border border-slate-200
               text-sm font-medium text-slate-700 bg-white hover:bg-slate-50 transition
               disabled:opacity-50 disabled:cursor-not-allowed">
        <svg *ngIf="!generating()" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0
               0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        <svg *ngIf="generating()" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        {{ generating() ? 'Loading...' : 'Generate Random' }}
      </button>

      <button
        (click)="onPredict()"
        [disabled]="!canPredict()"
        class="flex-1 flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl
               text-sm font-semibold text-white bg-primary hover:bg-primary-dark transition
               disabled:opacity-40 disabled:cursor-not-allowed">
        <svg *ngIf="!loading()" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
        </svg>
        <svg *ngIf="loading()" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        {{ loading() ? 'Analyzing...' : 'Analyze' }}
      </button>
    </div>
  </div>
</section>
